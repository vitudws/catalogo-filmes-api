<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Catálogo Filmes</title>
    <link href="style.css" rel="stylesheet"/>
    <link href="pipoca.icon.ico" rel="shortcut icon"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet"/>
</head>
<body>
    <header>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Início</a></li>
                <li><a href="#">Filmes</a></li>
            </ul>
        </nav>
    </header>

    <h1>Aqui você encontra os melhores filmes!</h1>

    <div class="top-controls">
        <input id="pesquisa" placeholder="Pesquisar por título, diretor ou gênero"/>

        <select id="filtroGenero">
            <option value="Todos">Todos os gêneros</option>
        </select>

        <button id="novoFilme">Adicionar Filme</button>
    </div>

    <div id="formCadastro" class="form-cadastro" style="display: none;">
        <input id="tituloFilme" placeholder="Título do filme">

        <input id="lancamentoFilme" type="date">

        <input id="classificacaoFilme" placeholder="Classificação">

        <input id="duracaoFilme" type="number" placeholder="Duração em minutos">

        <select id="selectDiretor">
            <option value="">Selecione o diretor</option>
        </select>

        <select id="selectGeneros" multiple size="5"></select>

        <button id="salvarFilme">Salvar Filme</button>
    </div>

    <div class="galeria" id="listaFilmes"></div>

    <script>
        const listaFilmes = document.getElementById("listaFilmes");
        const filtroGenero = document.getElementById("filtroGenero");
        const pesquisa = document.getElementById("pesquisa");
        const novoFilme = document.getElementById("novoFilme");

        const formCadastro = document.getElementById("formCadastro");
        const tituloFilme = document.getElementById("tituloFilme");
        const lancamentoFilme = document.getElementById("lancamentoFilme");
        const classificacaoFilme = document.getElementById("classificacaoFilme");
        const duracaoFilme = document.getElementById("duracaoFilme");
        const selectDiretor = document.getElementById("selectDiretor");
        const selectGeneros = document.getElementById("selectGeneros");
        const salvarFilme = document.getElementById("salvarFilme");

        let filmesCarregados = [];
        let generosDisponiveis = [];
        let diretoresDisponiveis = [];

        async function carregarFilmes() {
            try {
                const resposta = await fetch("/filmes");

                if (!resposta.ok) {
                    throw new Error("Erro ao buscar filmes");
                }

                filmesCarregados = await resposta.json();

                await carregarGeneros();
                await carregarDiretores();

                preencherFiltro();
                preencherSelectDiretores();
                preencherSelectGeneros();
                aplicarFiltros();

            } catch (erro) {
                listaFilmes.innerHTML = "<p>Erro ao carregar filmes. Verifique se a API está rodando.</p>";
            }
        }

        async function carregarGeneros() {
            try {
                const resposta = await fetch("/generos");

                if (!resposta.ok) {
                    throw new Error("Erro ao buscar gêneros");
                }

                generosDisponiveis = await resposta.json();

            } catch (erro) {
                generosDisponiveis = [];

                filmesCarregados.forEach(filme => {
                    if (filme.generos) {
                        filme.generos.forEach(genero => {
                            const jaExiste = generosDisponiveis.some(
                                g => g.idGenero === genero.idGenero
                            );

                            if (!jaExiste) {
                                generosDisponiveis.push(genero);
                            }
                        });
                    }
                });
            }
        }

        async function carregarDiretores() {
            try {
                const resposta = await fetch("/diretores");

                if (!resposta.ok) {
                    throw new Error("Erro ao buscar diretores");
                }

                diretoresDisponiveis = await resposta.json();

            } catch (erro) {
                diretoresDisponiveis = [];

                filmesCarregados.forEach(filme => {
                    if (filme.diretor) {
                        const jaExiste = diretoresDisponiveis.some(
                            diretor => diretor.idDiretor === filme.diretor.idDiretor
                        );

                        if (!jaExiste) {
                            diretoresDisponiveis.push(filme.diretor);
                        }
                    }
                });
            }
        }

        function preencherFiltro() {
            filtroGenero.innerHTML = `<option value="Todos">Todos os gêneros</option>`;

            generosDisponiveis.forEach(genero => {
                filtroGenero.innerHTML += `
                    <option value="${genero.nomeGenero}">
                        ${genero.nomeGenero}
                    </option>
                `;
            });
        }

        function preencherSelectDiretores() {
            selectDiretor.innerHTML = `<option value="">Selecione o diretor</option>`;

            diretoresDisponiveis.forEach(diretor => {
                selectDiretor.innerHTML += `
                    <option value="${diretor.idDiretor}">
                        ${diretor.nomeDiretor}
                    </option>
                `;
            });
        }

        function preencherSelectGeneros() {
            selectGeneros.innerHTML = "";

            generosDisponiveis.forEach(genero => {
                selectGeneros.innerHTML += `
                    <option value="${genero.idGenero}">
                        ${genero.nomeGenero}
                    </option>
                `;
            });
        }

        function aplicarFiltros() {
            const texto = pesquisa.value.toLowerCase();
            const generoSelecionado = filtroGenero.value;

            const filmesFiltrados = filmesCarregados.filter(filme => {
                const titulo = filme.titulo ? filme.titulo.toLowerCase() : "";

                const nomeDiretor = filme.diretor && filme.diretor.nomeDiretor
                    ? filme.diretor.nomeDiretor.toLowerCase()
                    : "";

                const generosDoFilme = filme.generos
                    ? filme.generos.map(genero => genero.nomeGenero)
                    : [];

                const textoGeneros = generosDoFilme.join(" ").toLowerCase();

                const batePesquisa =
                    titulo.includes(texto) ||
                    nomeDiretor.includes(texto) ||
                    textoGeneros.includes(texto);

                const bateGenero =
                    generoSelecionado === "Todos" ||
                    generosDoFilme.includes(generoSelecionado);

                return batePesquisa && bateGenero;
            });

            mostrarFilmes(filmesFiltrados);
        }

        function mostrarFilmes(filmes) {
            listaFilmes.innerHTML = "";

            if (filmes.length === 0) {
                listaFilmes.innerHTML = "<p>Nenhum filme encontrado.</p>";
                return;
            }

            filmes.forEach(filme => {
                const generos = filme.generos && filme.generos.length > 0
                    ? filme.generos.map(genero => genero.nomeGenero).join(", ")
                    : "Não informado";

                const nomeDiretor = filme.diretor && filme.diretor.nomeDiretor
                    ? filme.diretor.nomeDiretor
                    : "Não informado";

                const item = document.createElement("div");
                item.className = "item";

                item.innerHTML = `
                    <div class="poster-placeholder">${filme.titulo}</div>

                    <div class="painel">
                        <h2>${filme.titulo}</h2>
                        <h3>Ano de lançamento: ${formatarAno(filme.lancamento)}</h3>
                        <h3>Classificação: ${filme.classificacao}</h3>
                        <h3>Gêneros: ${generos}</h3>
                        <h3>Duração: ${filme.duracaoMin} min</h3>
                        <h3>Diretor: ${nomeDiretor}</h3>

                        <button onclick="verMais(${filme.idFilme})">Ver mais</button>
                        <button onclick="excluirFilme(${filme.idFilme})">Excluir</button>
                    </div>
                `;

                listaFilmes.appendChild(item);
            });
        }

        function formatarAno(data) {
            if (!data) {
                return "Não informado";
            }

            return String(data).substring(0, 4);
        }

        function verMais(id) {
            const filme = filmesCarregados.find(filme => filme.idFilme === id);

            if (!filme) {
                alert("Filme não encontrado.");
                return;
            }

            const generos = filme.generos && filme.generos.length > 0
                ? filme.generos.map(genero => genero.nomeGenero).join(", ")
                : "Não informado";

            const nomeDiretor = filme.diretor && filme.diretor.nomeDiretor
                ? filme.diretor.nomeDiretor
                : "Não informado";

            alert(
                `Título: ${filme.titulo}\n` +
                `Lançamento: ${filme.lancamento}\n` +
                `Classificação: ${filme.classificacao}\n` +
                `Gêneros: ${generos}\n` +
                `Duração: ${filme.duracaoMin} min\n` +
                `Diretor: ${nomeDiretor}`
            );
        }

        async function excluirFilme(id) {
            const confirmar = confirm("Excluir este filme?");

            if (!confirmar) {
                return;
            }

            try {
                const resposta = await fetch(`/filmes/${id}`, {
                    method: "DELETE"
                });

                if (!resposta.ok) {
                    throw new Error("Erro ao excluir filme");
                }

                await carregarFilmes();

            } catch (erro) {
                alert("Erro ao excluir filme.");
            }
        }

        async function adicionarFilme() {
            const generoIds = Array.from(selectGeneros.selectedOptions)
                .map(option => Number(option.value));

            const filme = {
                titulo: tituloFilme.value,
                lancamento: lancamentoFilme.value,
                classificacao: classificacaoFilme.value,
                duracaoMin: Number(duracaoFilme.value),
                idDiretor: Number(selectDiretor.value),
                generoIds: generoIds
            };

            if (
                !filme.titulo ||
                !filme.lancamento ||
                !filme.classificacao ||
                !filme.duracaoMin ||
                !filme.idDiretor
            ) {
                alert("Preencha todos os campos obrigatórios.");
                return;
            }

            try {
                const resposta = await fetch("/filmes", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(filme)
                });

                if (!resposta.ok) {
                    throw new Error("Erro ao adicionar filme");
                }

                limparFormulario();
                formCadastro.style.display = "none";

                await carregarFilmes();

            } catch (erro) {
                alert("Erro ao adicionar filme. Verifique os dados e a API.");
            }
        }

        function limparFormulario() {
            tituloFilme.value = "";
            lancamentoFilme.value = "";
            classificacaoFilme.value = "";
            duracaoFilme.value = "";
            selectDiretor.value = "";

            Array.from(selectGeneros.options).forEach(option => {
                option.selected = false;
            });
        }

        pesquisa.oninput = aplicarFiltros;
        filtroGenero.onchange = aplicarFiltros;

        novoFilme.onclick = () => {
            formCadastro.style.display =
                formCadastro.style.display === "none" ? "flex" : "none";
        };

        salvarFilme.onclick = adicionarFilme;

        carregarFilmes();
    </script>
</body>
</html>
